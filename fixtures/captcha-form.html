<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Fixture: Captcha Form</title></head>
<body>
<script>window.__formSubmitted = false;</script>
<form onsubmit="window.__formSubmitted=true; return false;">
  <label for="name">Full Name</label>
  <input type="text" id="name" name="name" />

  <!-- Fake captcha placeholder -->
  <div id="captcha-container" data-sitekey="fake-key" class="g-recaptcha">
    <div style="border:1px solid #ccc;padding:10px;width:200px">
      <label><input type="checkbox" id="captcha-checkbox" /> I am not a robot</label>
    </div>
  </div>

  <button type="submit">Submit</button>
</form>
</body>
</html>
